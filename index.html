<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#6c63ff" />
  <link rel="manifest" href="manifest.json" />
  <title>牙套时间管家</title>
  <style>
    :root{--bg:#f7f7fb;--card:#fff;--text:#202124;--muted:#777;--main:#6c63ff;--danger:#ff5a5f;--ok:#20b26b}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:520px;margin:0 auto;padding:18px 16px 28px}
    .top{display:flex;justify-content:space-between;align-items:center;margin:8px 0 18px}
    h1{font-size:24px;margin:0}.date{font-size:13px;color:var(--muted)}
    .card{background:var(--card);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 8px 22px rgba(0,0,0,.06)}
    .big{font-size:44px;font-weight:800;letter-spacing:-1px;text-align:center;margin:10px 0}
    .sub{text-align:center;color:var(--muted);font-size:14px}
    .progress{height:12px;background:#e9e9f4;border-radius:99px;overflow:hidden;margin:18px 0 6px}
    .bar{height:100%;width:0;background:var(--main);border-radius:99px;transition:.25s}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    button{border:0;border-radius:16px;padding:15px 12px;font-size:16px;font-weight:700;color:#fff;background:var(--main)}
    button.secondary{background:#111} button.danger{background:var(--danger)} button.ok{background:var(--ok)}
    button:disabled{opacity:.45}
    .row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #eee}
    .row:last-child{border-bottom:0}.muted{color:var(--muted);font-size:13px}
    input{width:100%;border:1px solid #ddd;border-radius:14px;padding:12px;font-size:16px}
    .smallbtn{font-size:13px;padding:10px 12px;border-radius:12px}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:sticky;bottom:0;background:rgba(247,247,251,.9);backdrop-filter:blur(10px);padding:10px 0}
    .tab{color:#444;background:#fff;box-shadow:0 5px 14px rgba(0,0,0,.05);font-size:13px;padding:11px 4px}
    .tab.active{background:var(--main);color:white}
    .hide{display:none}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#f1f1ff;color:var(--main);font-size:12px;font-weight:700}
    textarea{width:100%;min-height:90px;border:1px solid #ddd;border-radius:14px;padding:12px;font-size:15px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>牙套时间管家</h1><div class="date" id="today"></div></div>

  <section id="page-home">
    <div class="card">
      <div class="sub">今日已佩戴</div>
      <div class="big" id="wearTime">00:00</div>
      <div class="sub" id="statusText">当前状态：佩戴中</div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="sub" id="goalText">目标：22小时 / 今日</div>
      <div class="btns">
        <button id="takeOffBtn" class="danger">摘下牙套</button>
        <button id="putOnBtn" class="ok">戴回牙套</button>
      </div>
    </div>

    <div class="card">
      <div class="row"><b>今日摘下累计</b><span id="offTime">00:00</span></div>
      <div class="row"><b>剩余可摘时间</b><span id="leftOffTime">02:00</span></div>
      <div class="row"><b>当前牙套</b><span id="trayInfo">第 1 副</span></div>
      <div class="row"><b>下次换牙套</b><span id="nextTray">未设置</span></div>
    </div>
  </section>

  <section id="page-tray" class="hide">
    <div class="card">
      <h2>牙套进度</h2>
      <p class="muted">设置总副数、当前第几副、每副佩戴天数。</p>
      <label>总副数</label><input id="totalTrays" type="number" min="1" value="30">
      <br><br><label>当前第几副</label><input id="currentTray" type="number" min="1" value="1">
      <br><br><label>每副佩戴天数</label><input id="daysPerTray" type="number" min="1" value="7">
      <br><br><label>本副开始日期</label><input id="trayStart" type="date">
      <br><br><button onclick="saveTray()">保存进度</button>
    </div>
  </section>

  <section id="page-photo" class="hide">
    <div class="card">
      <h2>拍照记录</h2>
      <p class="muted">可以选择牙齿照片，本地记录日期。网页不会上传你的照片。</p>
      <input id="photoInput" type="file" accept="image/*" capture="environment">
      <br><br><button onclick="savePhoto()">保存照片记录</button>
    </div>
    <div class="card" id="photoList"></div>
  </section>

  <section id="page-note" class="hide">
    <div class="card">
      <h2>正畸日记</h2>
      <textarea id="noteText" placeholder="例如：今天第3副，门牙酸，下牙黑三角观察中……"></textarea>
      <br><br><button onclick="saveNote()">保存日记</button>
    </div>
    <div class="card" id="noteList"></div>
  </section>

  <div class="tabs">
    <button class="tab active" onclick="showPage('home',this)">首页</button>
    <button class="tab" onclick="showPage('tray',this)">牙套</button>
    <button class="tab" onclick="showPage('photo',this)">拍照</button>
    <button class="tab" onclick="showPage('note',this)">日记</button>
  </div>
</div>

<script>
const KEY='aligner_pwa_v1';
const todayKey = () => new Date().toISOString().slice(0,10);
const pad=n=>String(n).padStart(2,'0');
const fmt=ms=>{ms=Math.max(0,ms);let m=Math.floor(ms/60000),h=Math.floor(m/60);m%=60;return `${pad(h)}:${pad(m)}`};
let data = JSON.parse(localStorage.getItem(KEY)||'{}');
function initDay(){
  const d=todayKey();
  data.days ||= {};
  if(!data.days[d]) data.days[d]={offMs:0, events:[], isWearing:true, lastChange:Date.now()};
  data.tray ||= {total:30,current:1,daysPerTray:7,start:d};
  data.photos ||= [];
  data.notes ||= [];
  save();
}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function day(){return data.days[todayKey()]}
function currentOffMs(){
  const x=day();
  return x.offMs + (!x.isWearing ? Date.now()-x.lastChange : 0);
}
function update(){
  initDay();
  document.getElementById('today').textContent = todayKey();
  const off=currentOffMs(), wear=24*3600000-off, goal=22*3600000;
  document.getElementById('wearTime').textContent=fmt(wear);
  document.getElementById('offTime').textContent=fmt(off);
  document.getElementById('leftOffTime').textContent=fmt(2*3600000-off);
  document.getElementById('bar').style.width=Math.min(100,wear/goal*100)+'%';
  document.getElementById('statusText').textContent='当前状态：'+(day().isWearing?'佩戴中':'已摘下');
  document.getElementById('takeOffBtn').disabled=!day().isWearing;
  document.getElementById('putOnBtn').disabled=day().isWearing;
  document.getElementById('trayInfo').textContent=`第 ${data.tray.current} / ${data.tray.total} 副`;
  const next = new Date(data.tray.start); next.setDate(next.getDate()+Number(data.tray.daysPerTray||7));
  document.getElementById('nextTray').textContent=next.toISOString().slice(0,10);
}
document.getElementById('takeOffBtn').onclick=()=>{ if(day().isWearing){day().isWearing=false;day().lastChange=Date.now();day().events.push(['off',Date.now()]);save();update();}};
document.getElementById('putOnBtn').onclick=()=>{ if(!day().isWearing){day().offMs+=Date.now()-day().lastChange;day().isWearing=true;day().lastChange=Date.now();day().events.push(['on',Date.now()]);save();update();}};
function showPage(name,btn){
  ['home','tray','photo','note'].forEach(p=>document.getElementById('page-'+p).classList.toggle('hide',p!==name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  if(name==='tray') fillTray(); if(name==='photo') renderPhotos(); if(name==='note') renderNotes();
}
function fillTray(){
  totalTrays.value=data.tray.total; currentTray.value=data.tray.current; daysPerTray.value=data.tray.daysPerTray; trayStart.value=data.tray.start;
}
function saveTray(){
  data.tray={total:+totalTrays.value,current:+currentTray.value,daysPerTray:+daysPerTray.value,start:trayStart.value||todayKey()};
  save(); update(); alert('已保存');
}
function savePhoto(){
  const f=photoInput.files[0]; if(!f) return alert('请先选择照片');
  data.photos.unshift({name:f.name,date:new Date().toLocaleString()}); save(); renderPhotos(); photoInput.value='';
}
function renderPhotos(){
  photoList.innerHTML='<h3>照片记录</h3>'+ (data.photos.map(p=>`<div class="row"><span>${p.date}</span><span class="muted">${p.name}</span></div>`).join('')||'<p class="muted">暂无记录</p>');
}
function saveNote(){
  if(!noteText.value.trim()) return;
  data.notes.unshift({text:noteText.value.trim(),date:new Date().toLocaleString()}); noteText.value=''; save(); renderNotes();
}
function renderNotes(){
  noteList.innerHTML='<h3>日记记录</h3>'+ (data.notes.map(n=>`<div class="row"><span>${n.text}</span><span class="muted">${n.date}</span></div>`).join('')||'<p class="muted">暂无记录</p>');
}
initDay(); update(); setInterval(update,1000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
